_BASE_: "../Base-RCNN.yaml"
MODEL:
  WEIGHTS: "output/symbols/base_training/model_reset_surgery.pth"
  MASK_ON: False
  BACKBONE:
    FREEZE: False
  RESNETS:
    DEPTH: 101
  RPN:
    ENABLE_DECOUPLE: True
    BACKWARD_SCALE: 0.0
    FREEZE: False
  ROI_HEADS:
    NUM_CLASSES: 4
    FREEZE_FEAT: True
    CLS_DROPOUT: True
    ENABLE_DECOUPLE: True
    BACKWARD_SCALE: 0.01
DATASETS:
  TRAIN: ('symbols_train_5shot_seed0',)
  TEST: ('symbols_val_novel',)
SOLVER:
  IMS_PER_BATCH: 8
  BASE_LR: 0.005
  STEPS: (400,)
  MAX_ITER: 500
  CHECKPOINT_PERIOD: 100
  WARMUP_ITERS: 0
  CLIP_GRADIENTS:
    ENABLED: True
    CLIP_TYPE: "value"
    CLIP_VALUE: 1.0
TEST:
  PCB_ENABLE: True
  PCB_MODELPATH: "https://dl.fbaipublicfiles.com/detectron2/ImageNetPretrained/MSRA/R-101.pkl"
OUTPUT_DIR: "output/symbols/fsod_5shot"
