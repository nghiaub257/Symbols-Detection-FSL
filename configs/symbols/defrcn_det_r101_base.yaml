_BASE_: "../Base-RCNN.yaml"
MODEL:
  WEIGHTS: "detectron2://ImageNetPretrained/MSRA/R-101.pkl"
  MASK_ON: False
  RESNETS:
    DEPTH: 101
  RPN:
    ENABLE_DECOUPLE: True
    BACKWARD_SCALE: 0.0
  ROI_HEADS:
    NUM_CLASSES: 28
    ENABLE_DECOUPLE: True
    BACKWARD_SCALE: 0.75
DATASETS:
  TRAIN: ('symbols_train_base',)
  TEST: ('symbols_val_base',)
SOLVER:
  IMS_PER_BATCH: 16
  STEPS: (15000, 18000)
  MAX_ITER: 20000
  CHECKPOINT_PERIOD: 5000
OUTPUT_DIR: "output/symbols/base_training"
