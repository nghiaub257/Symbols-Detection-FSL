_BASE_: "../Base-RCNN.yaml"
MODEL:
  WEIGHTS: "https://dl.fbaipublicfiles.com/detectron2/ImageNetPretrained/MSRA/R-101.pkl"
  MASK_ON: False
  RESNETS:
    DEPTH: 101
  RPN:
    ENABLE_DECOUPLE: True
    BACKWARD_SCALE: 0.0
  ROI_HEADS:
    NUM_CLASSES: 28
    ENABLE_DECOUPLE: True
    BACKWARD_SCALE: 0.75
DATASETS:
  TRAIN: ('symbols_train_base',)
  TEST: ('symbols_val_base',)
SOLVER:
  IMS_PER_BATCH: 8
  BASE_LR: 0.0005
  STEPS: (15000, 18000)
  MAX_ITER: 20000
  CHECKPOINT_PERIOD: 5000
  WARMUP_ITERS: 500
  WARMUP_FACTOR: 0.001
  CLIP_GRADIENTS:
    ENABLED: True
    CLIP_TYPE: "value"
    CLIP_VALUE: 1.0
OUTPUT_DIR: "output/symbols/base_training"
